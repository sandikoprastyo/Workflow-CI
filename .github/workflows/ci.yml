name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version
          which python

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow==2.19.0

      - name: Run mlflow project
        run: mlflow run MLProject --no-conda

      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          run_id=$(grep -oP 'run_id: \K.*' MLProject/model_artifacts/mlflow_run.txt)
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "Got run_id: $run_id"

      - name: Install Python dependencies
        run: pip install gdown

      - name: Upload to Google Drive
        run: |
          cd MLProject
          zip -r model_artifacts.zip model_artifacts/
          gdown --folder "${{ secrets.GDRIVE_FOLDER_ID }}" --remaining-ok || true
          echo "Uploaded model_artifacts.zip to Google Drive"

      - name: Build Docker Model
        run: |
          cd MLProject
          mlflow models build-docker \
            --model-uri "runs:/${{ steps.get_run_id.outputs.run_id }}/regressor_model" \
            --name "fifa-player-scout"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: |
          docker tag fifa-player-scout ${{ secrets.DOCKER_USERNAME }}/fifa-player-scout:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fifa-player-scout:latest
