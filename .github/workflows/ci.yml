name: CI Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow==2.19.0

      - name: Train model with MLflow
        run: |
          cd MLProject
          python modelling.py

      - name: Upload model artifacts to GitHub Releases
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: MLProject/model_artifacts/

      - name: Build Docker image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          cd MLProject
          mlflow models build-docker --model-uri runs:/$(cat model_artifacts/mlflow_run.txt | cut -d' ' -f2)/regressor_model --name "fifa-player-scout"
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
          docker tag fifa-player-scout $DOCKER_USERNAME/fifa-player-scout:latest
          docker push $DOCKER_USERNAME/fifa-player-scout:latest
