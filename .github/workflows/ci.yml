name: CI Training Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'MLProject/**'
  workflow_dispatch:

env:
  MLFLOW_TRACKING_URI: ${{ vars.MLFLOW_TRACKING_URI || '' }}
  DOCKER_IMAGE: sandikoprastyo/fifa-player-scout

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn mlflow

    - name: Run training with MLflow
      run: |
        cd MLProject
        python modelling.py

    - name: Upload model artifacts
      uses: actions/upload-artifact@v4
      with:
        name: model-artifacts
        path: MLProject/model_artifacts/
        retention-days: 30

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: model-v${{ github.run_number }}
        name: Model Release v${{ github.run_number }}
        files: |
          MLProject/model_artifacts/**
        token: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    needs: train
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn mlflow

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      run: |
        cd MLProject
        mlflow models build-docker \
          --model-registry-uri "" \
          --name "${{ env.DOCKER_IMAGE }}:${{ github.run_number }}"
        docker tag "${{ env.DOCKER_IMAGE }}:${{ github.run_number }}" "${{ env.DOCKER_IMAGE }}:latest"
        docker push "${{ env.DOCKER_IMAGE }}:${{ github.run_number }}"
        docker push "${{ env.DOCKER_IMAGE }}:latest"
